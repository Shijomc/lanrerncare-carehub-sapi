name: Pipeline to deploy to CloudHub 2.0

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: stg-${{ github.event.repository.name }}
  cancel-in-progress: true

jobs:
  DeployToExchange:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: maven

      - name: Create Maven Settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                    http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>CLIENT_ID_PLACEHOLDER~?~CLIENT_SECRET_PLACEHOLDER</password>
              </server>
              <server>
                <id>MuleRepository</id>
                <username>~~~Client~~~</username>
                <password>CLIENT_ID_PLACEHOLDER~?~CLIENT_SECRET_PLACEHOLDER</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>mule-extra-repos</id>
                <activation>
                  <activeByDefault>true</activeByDefault>
                </activation>
                <repositories>
                  <repository>
                    <id>MuleRepository</id>
                    <name>MuleSoft Public Repository</name>
                    <url>https://repository.mulesoft.org/nexus/content/repositories/public/</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>anypoint-exchange-v3</id>
                    <name>Anypoint Exchange</name>
                    <url>https://maven.anypoint.mulesoft.com/api/v3/organizations/3b5906df-666f-48a2-b837-f9309008aec9/maven</url>
                    <layout>default</layout>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>MuleRepository</id>
                    <url>https://repository.mulesoft.org/nexus/content/repositories/public/</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
          </settings>
          EOF
          sed -i "s|CLIENT_ID_PLACEHOLDER|${{ secrets.CONNECTED_APP_CLIENT_ID }}|g" ~/.m2/settings.xml
          sed -i "s|CLIENT_SECRET_PLACEHOLDER|${{ secrets.CONNECTED_APP_CLIENT_SECRET }}|g" ~/.m2/settings.xml

      # run_number: increments on every new push/trigger (e.g. 11, 12, 13...)
      # run_attempt: increments on every re-run of the same workflow (e.g. 1, 2, 3...)
      # Together they are always unique — no shell tricks needed.
      - name: Set unique version
        run: |
          VERSION="1.0.0-${{ github.run_number }}-${{ github.run_attempt }}"
          echo "Building version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Publish to Exchange
        run: |
          mvn deploy -DskipMunitTests \
          -Dclient.id="${{ secrets.CONNECTED_APP_CLIENT_ID }}" \
          -Dclient.secret="${{ secrets.CONNECTED_APP_CLIENT_SECRET }}"

  DeployToCloudHub2:
    needs: DeployToExchange
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: maven

      - name: Create Maven Settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                    http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>CLIENT_ID_PLACEHOLDER~?~CLIENT_SECRET_PLACEHOLDER</password>
              </server>
              <server>
                <id>MuleRepository</id>
                <username>~~~Client~~~</username>
                <password>CLIENT_ID_PLACEHOLDER~?~CLIENT_SECRET_PLACEHOLDER</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>mule-extra-repos</id>
                <activation>
                  <activeByDefault>true</activeByDefault>
                </activation>
                <repositories>
                  <repository>
                    <id>MuleRepository</id>
                    <name>MuleSoft Public Repository</name>
                    <url>https://repository.mulesoft.org/nexus/content/repositories/public/</url>
                    <releases><enabled>true</enabled></releases>
                    <snapshots><enabled>true</enabled></snapshots>
                  </repository>
                  <repository>
                    <id>anypoint-exchange-v3</id>
                    <name>Anypoint Exchange</name>
                    <url>https://maven.anypoint.mulesoft.com/api/v3/organizations/3b5906df-666f-48a2-b837-f9309008aec9/maven</url>
                    <layout>default</layout>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>MuleRepository</id>
                    <url>https://repository.mulesoft.org/nexus/content/repositories/public/</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
          </settings>
          EOF
          sed -i "s|CLIENT_ID_PLACEHOLDER|${{ secrets.CONNECTED_APP_CLIENT_ID }}|g" ~/.m2/settings.xml
          sed -i "s|CLIENT_SECRET_PLACEHOLDER|${{ secrets.CONNECTED_APP_CLIENT_SECRET }}|g" ~/.m2/settings.xml

      # Same version formula as DeployToExchange — must match exactly
      # so CloudHub picks up the artifact already published to Exchange.
      - name: Set unique version
        run: |
          VERSION="1.0.0-${{ github.run_number }}-${{ github.run_attempt }}"
          echo "Deploying version: $VERSION"
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Deploy to CloudHub 2.0
        run: |
          mvn deploy -DskipMunitTests -DmuleDeploy \
          -Dclient.id="${{ secrets.CONNECTED_APP_CLIENT_ID }}" \
          -Dclient.secret="${{ secrets.CONNECTED_APP_CLIENT_SECRET }}" \
          -Dmule.env="Dev"